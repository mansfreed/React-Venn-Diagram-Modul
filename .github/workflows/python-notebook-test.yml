name: Python notebook tests

on:
  push:
    branches: [main, "feature/**"]
    paths:
      - "python/**"
      - ".github/workflows/python-notebook-test.yml"
  pull_request:
    paths:
      - "python/**"
      - ".github/workflows/python-notebook-test.yml"
  schedule:
    - cron: "0 6 * * *"  # daily at 06:00 UTC
  workflow_dispatch:

jobs:
  notebooks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system deps for cairosvg
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev libpango-1.0-0 libpangocairo-1.0-0

      - name: Sync bundled data
        run: python python/scripts/sync_data.py

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e 'python/[dev]'

      - name: Execute notebooks
        run: pytest python/tests/test_notebooks.py -v -m slow
