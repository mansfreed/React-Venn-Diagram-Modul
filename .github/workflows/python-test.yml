name: Python tests

on:
  push:
    branches: [main, "feature/**"]
    paths:
      - "python/**"
      - "models/**"
      - "data/**"
      - ".github/workflows/python-test.yml"
  pull_request:
    paths:
      - "python/**"
      - "models/**"
      - "data/**"
      - ".github/workflows/python-test.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macOS + Windows hit cairosvg's libcairo runtime lookup failure even
        # after brew/system installs (Python's ctypes.util.find_library() can't
        # see the bundled dylib/dll on hosted runners). Linux-only for now;
        # Phase 9 (PyPI release) will revisit -- likely via pycairo dep or
        # explicit DYLD_LIBRARY_PATH setup. The package WORKS on macOS/Windows
        # locally with the right system deps; this is a CI-environment gap.
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system deps for cairosvg (Linux)
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev libpango-1.0-0 libpangocairo-1.0-0

      - name: Sync data into _data
        run: python python/scripts/sync_data.py

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e "python/[dev]"

      - name: Ruff
        run: ruff check python/

      - name: Mypy
        run: mypy --config-file python/pyproject.toml python/src/venn_diagram_lab/

      - name: Pytest
        run: pytest python/tests/ -v
